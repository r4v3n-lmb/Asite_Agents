services:
  - type: web
    name: asite-agent-dashboard
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m asite_agent.dashboard --host 0.0.0.0 --port $PORT
    plan: starter
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DRY_RUN
        value: "true"
